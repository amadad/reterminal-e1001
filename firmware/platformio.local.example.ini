[env:reterminal]
; Keep this file untracked after copying to platformio.local.ini.
; The base build flags are repeated intentionally: referencing
; ${env:reterminal.build_flags} from an extra_config can recurse.
build_flags =
    -DBOARD_HAS_PSRAM
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DEPAPER_ENABLE
    -Iinclude
    -DRETERMINAL_WIFI_SSID=\"your-ssid\"
    -DRETERMINAL_WIFI_PASS=\"your-password\"
    -DRETERMINAL_HOSTNAME=\"reterminal\"
    -DRETERMINAL_OTA_PASSWORD=\"set-a-real-password\"
    -DRETERMINAL_FIRMWARE_VERSION=\"local-dev\"
    -DRETERMINAL_BUILD_SHA=\"unknown\"

[env:ota]
upload_port = reterminal.local
upload_flags =
    --auth=set-a-real-password
    --timeout=30
